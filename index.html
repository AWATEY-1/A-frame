<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Villa with Pool - A-Frame</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="info">
        <h3>Luxury Villa Environment</h3>
        <p>WASD to move • Mouse to look • Click to interact</p>
    </div>

    <a-scene 
        background="color: #87CEEB" 
        fog="type: linear; color: #87CEEB; far: 100; near: 0"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">
        
        <!-- Lighting -->
        <a-light type="ambient" color="#404040" intensity="0.5"></a-light>
        <a-light type="directional" position="1 1 1" color="#ffffff" intensity="0.5" shadow="cast: true"></a-light>
        <a-light type="point" position="0 10 0" color="#ffffff" intensity="0.3"></a-light>
        
        <!-- Environment -->
        <a-sky color="#87CEEB"></a-sky>
        
        <!-- Ground -->
        <a-plane 
            position="0 0 0" 
            rotation="-90 0 0" 
            width="100" 
            height="100" 
            color="#90EE90"
            shadow="receive: true">
        </a-plane>
        
        <!-- Grass patches for more realistic ground -->
        <a-plane 
            position="0 0.01 0" 
            rotation="-90 0 0" 
            width="120" 
            height="120" 
            color="#7CFC00"
            transparent="true"
            opacity="0.3">
        </a-plane>
        
        <!-- House Model -->
        <a-entity 
            gltf-model="#house-model" 
            position="0 0 0"
            scale="1 1 1"
            shadow="cast: true; receive: true">
        </a-entity>
        
        <!-- Pool -->
        <a-box 
            position="0 -0.5 8" 
            width="8" 
            height="1" 
            depth="4" 
            color="#006994"
            transparent="true"
            opacity="0.8">
        </a-box>
        
        <!-- Pool Water Surface -->
        <a-plane 
            position="0 0 8" 
            rotation="-90 0 0" 
            width="8" 
            height="4" 
            color="#00BFFF"
            transparent="true"
            opacity="0.6"
            animation="property: position; to: 0 0.05 8; dir: alternate; dur: 3000; loop: true">
        </a-plane>
        
        <!-- Pool Deck -->
        <a-plane 
            position="0 -0.01 8" 
            rotation="-90 0 0" 
            width="12" 
            height="8" 
            color="#F5DEB3"
            shadow="receive: true">
        </a-plane>
        
        <!-- Pool Lounge Chairs -->
        <a-box 
            position="-3 0.5 8" 
            width="2" 
            height="0.1" 
            depth="0.8" 
            color="#8B4513"
            rotation="0 0 0">
        </a-box>
        <a-box 
            position="-3 1 8" 
            width="2" 
            height="0.8" 
            depth="0.1" 
            color="#4682B4"
            rotation="45 0 0">
        </a-box>
        
        <a-box 
            position="3 0.5 8" 
            width="2" 
            height="0.1" 
            depth="0.8" 
            color="#8B4513"
            rotation="0 0 0">
        </a-box>
        <a-box 
            position="3 1 8" 
            width="2" 
            height="0.8" 
            depth="0.1" 
            color="#4682B4"
            rotation="45 0 0">
        </a-box>
        
        <!-- Palm Trees for decoration -->
        <a-cylinder 
            position="-15 2 -10" 
            radius="0.5" 
            height="4" 
            color="#8B4513">
        </a-cylinder>
        <a-sphere 
            position="-15 4 -10" 
            radius="2" 
            color="#228B22">
        </a-sphere>
        
        <a-cylinder 
            position="15 2 -10" 
            radius="0.5" 
            height="4" 
            color="#8B4513">
        </a-cylinder>
        <a-sphere 
            position="15 4 -10" 
            radius="2" 
            color="#228B22">
        </a-sphere>
        
        <a-cylinder 
            position="-15 2 10" 
            radius="0.5" 
            height="4" 
            color="#8B4513">
        </a-cylinder>
        <a-sphere 
            position="-15 4 10" 
            radius="2" 
            color="#228B22">
        </a-sphere>
        
        <a-cylinder 
            position="15 2 10" 
            radius="0.5" 
            height="4" 
            color="#8B4513">
        </a-cylinder>
        <a-sphere 
            position="15 4 10" 
            radius="2" 
            color="#228B22">
        </a-sphere>
        
        <!-- Fence around property -->
        <a-box 
            position="-20 1 0" 
            width="0.5" 
            height="2" 
            depth="40" 
            color="#8B4513">
        </a-box>
        <a-box 
            position="20 1 0" 
            width="0.5" 
            height="2" 
            depth="40" 
            color="#8B4513">
        </a-box>
        <a-box 
            position="0 1 -20" 
            width="40" 
            height="2" 
            depth="0.5" 
            color="#8B4513">
        </a-box>
        <a-box 
            position="0 1 20" 
            width="40" 
            height="2" 
            depth="0.5" 
            color="#8B4513">
        </a-box>
        
        <!-- Camera with movement controls -->
        <a-camera 
            position="0 1.6 10" 
            wasd-controls="acceleration: 20"
            look-controls="pointerLockEnabled: true">
        </a-camera>
        
        <!-- Assets -->
        <a-assets>
            <a-asset-item 
                id="house-model" 
                src="modern_luxury_villa_house_building_with_pool.glb">
            </a-asset-item>
        </a-assets>
        
    </a-scene>
</body>
</html>
